<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Codi Capture — options</title>
<style>
  body { font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1b1f24; margin: 24px; max-width: 520px; }
  h1 { font-size: 16px; }
  label { display: block; font-size: 12px; color: #667085; margin: 14px 0 4px; }
  input { width: 100%; padding: 8px 10px; border: 1px solid #dfe3e8; border-radius: 6px; font-size: 13px; font-family: ui-monospace, Menlo, monospace; }
  button { margin-top: 14px; padding: 8px 14px; border: 1px solid #16191d; background: #16191d; color: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
  #status { margin-top: 12px; font-size: 12px; min-height: 18px; }
  .hint { color: #667085; font-size: 12px; }
</style>
</head>
<body>
  <h1>Codi Capture</h1>
  <p class="hint">Where is your Codi API Tester running? Capturing a page sends it straight to this tab.</p>
  <label>Tester URL</label>
  <input id="url" placeholder="https://your-tester.vercel.app  (or http://localhost:4000)">
  <p class="hint">Saving asks for permission to send pages to that site — needed so the extension can deliver captures there.</p>
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
